name: Build My AI App
on: [push]

jobs:
  build:
    # Nuclear Change 1: Explicitly use the new ARM64 runner
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Xcode Version
        # Nuclear Change 2: Ensure we are using the modern compiler
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Nuclear Resolve
        run: xcodebuild -resolvePackageDependencies -project mlx-swift-examples.xcodeproj

      - name: Nuclear Build
        run: |
          xcodebuild -project mlx-swift-examples.xcodeproj \
          -scheme LLMEval \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO \
          GENERATE_INFOPLIST_FILE=YES

      - name: Manual IPA Creation
        # Nuclear Change 3: We don't use 'xcodebuild archive'. 
        # We manually grab the app and zip it.
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/LLMEval.app Payload/
          zip -r MyAI.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: MyCustomAI-IPA
          path: MyAI.ipa
