name: Build My AI App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build LLMEval
        run: |
          # 1. Update submodules (MLX needs these to see the C++ core)
          git submodule update --init --recursive
          
          # 2. Build with "No-Signing" flags + skip package validation
          xcodebuild -project mlx-swift-examples.xcodeproj \
          -scheme LLMEval \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO
      - name: Create Package
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/LLMEval.app Payload/
          zip -r MyAI.ipa Payload
      - name: Save My App
        uses: actions/upload-artifact@v4
        with:
          name: MyCustomAI-IPA
          path: MyAI.ipa
