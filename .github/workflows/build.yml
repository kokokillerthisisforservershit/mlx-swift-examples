name: Build My AI App
on: [push]

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Modern Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Nuclear Package Resolve
        run: xcodebuild -resolvePackageDependencies -project mlx-swift-examples.xcodeproj

      - name: Nuclear Build
        run: |
          xcodebuild -project mlx-swift-examples.xcodeproj \
          -scheme LLMEval \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO \
          GENERATE_INFOPLIST_FILE=YES

      - name: Inject RAM and Network Entitlement
        run: |
          PLIST="build/Build/Products/Release-iphoneos/LLMEval.app/Info.plist"
          # Unlock the 16GB/8GB RAM
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.kernel.increased-memory-limit bool true" "$PLIST"
          # Allow background downloads and large file transfers
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string fetch" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST"
      - name: Manual Payload Creation
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/LLMEval.app Payload/
          zip -r MyAI.ipa Payload

      - name: Save My App
        uses: actions/upload-artifact@v4
        with:
          name: MyCustomAI-IPA
          path: MyAI.ipa
