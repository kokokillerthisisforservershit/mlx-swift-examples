name: Build My AI App
on: [push]

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Modern Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Nuclear Package Resolve
        run: xcodebuild -resolvePackageDependencies -project mlx-swift-examples.xcodeproj

      - name: Inject RAM and Network Entitlement
        run: |
          # Use a dedicated entitlements file for the RAM unlock
          cat <<EOF > App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.kernel.increased-memory-limit</key>
              <true/>
              <key>com.apple.developer.kernel.extended-virtual-addressing</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Nuclear Build
        run: |
          xcodebuild -project mlx-swift-examples.xcodeproj \
          -scheme LLMEval \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS=App.entitlements \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          
      - name: Manual Payload Creation
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/LLMEval.app Payload/
          zip -r MyAI.ipa Payload

      - name: Save My App
        uses: actions/upload-artifact@v4
        with:
          name: MyCustomAI-IPA
          path: MyAI.ipa
