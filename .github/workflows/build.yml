name: Build My AI App
on: [push]

jobs:
  build:
    # Nuclear Change 1: Use the specific 2026 ARM64 runner
    runs-on: macos-26
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Modern Xcode
        # Nuclear Change 2: Use the 2026 stable version (26.2) 
        # instead of the old Xcode 16 path
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Nuclear Package Resolve
        run: xcodebuild -resolvePackageDependencies -project mlx-swift-examples.xcodeproj

      - name: Nuclear Build
        run: |
          xcodebuild -project mlx-swift-examples.xcodeproj \
          -scheme LLMEval \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          COMPILER_INDEX_STORE_ENABLE=NO \
          GENERATE_INFOPLIST_FILE=YES

      - name: Manual Payload Creation
        # Nuclear Change 3: Bypass Apple's export system entirely
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/LLMEval.app Payload/
          zip -r MyAI.ipa Payload

      - name: Save My App
        uses: actions/upload-artifact@v4
        with:
          name: MyCustomAI-IPA
          path: MyAI.ipa
